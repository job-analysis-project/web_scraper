version: '3.3'
services:

  mysql:
      image: mysql:8.0
      # 設定 mysql 使用原生認證的密碼 hash
      command: mysqld --default-authentication-plugin=mysql_native_password
      ports: 
        # docker publish port 3306 to 3306 
        # (將 docker 內部 ip 3306, 跟外部 3306 做連結)
          - 3306:3306
        # - target: 3306
        #   published: 3306
        #   mode: host
      environment: # 環境變數, 設置 db, user, password, root_password
          MYSQL_DATABASE: data_jobs
          MYSQL_USER: user
          MYSQL_PASSWORD: '0*Py6u38ofI'
          MYSQL_ROOT_PASSWORD: 'ppWgnb_mfGe2m_'
      restart: always  # if the contianer stops, restart automatically
      volumes:
          - mysql:/var/lib/mysql
          # share volumes of docker container to outside volume, 
          # so the data persists
      networks:
          - job_network

  phpmyadmin:
      image: phpmyadmin:5.2
      restart: always  # # if the contianer stops, restart automatically.
      ports:
          - 8080:80
      environment:
          # use service name to connect to mysql instead of using links 
          PMA_HOST: mysql
          PMA_PORT: 3306
      depends_on:
        - mysql
      networks:
          - job_network
     
networks:
  job_network:
    # join existing network 
    external: true

volumes:
  mysql: